name: CI Tests
on:
  pull_request:
    paths-ignore:
      - 'README.md'
  push:
    branches:
      - 'master'
    paths-ignore:
      - 'README.md'

permissions:
  contents: read

jobs:
  go-fmt-and-vet:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.23'
        cache: true
    - name: Go Formatting
      run: |
        files=$(go fmt ./...)
        if [ -n "$files" ]; then
          echo "The following file(s) do not conform to go fmt:"
          echo "$files"
          exit 1
        fi
  go-test:
    needs: go-fmt-and-vet
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.23'
        cache: true
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
    - name: Run race detector tests (skip large data tests)
      run: |
        go test -race -short -v ./...
    - name: Run full test suite with coverage (no race detector)
      run: |
        go test -v -coverprofile=coverage.out ./...
    - name: Upload Coverage report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with: 
        path: coverage.out
        name: Coverage-report
    - name: Display coverage report
      run: go tool cover -func=coverage.out
    - name: Build Go
      run: go build ./...
